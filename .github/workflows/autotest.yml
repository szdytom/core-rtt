name: Build and run autotests

on:
  push:
    branches: [main]
    paths:
      - 'corelib/**'
      - 'rusty-corelib/**'
      - 'src/**'
      - 'include/**'
      - 'js/core-autotest/**'
      - 'js/corereplay/**'
      - '.github/workflows/autotest.yml'
      - 'CMakeLists.txt'
      - 'scripts/autotest.sh'
  pull_request:
    paths:
      - 'corelib/**'
      - 'rusty-corelib/**'
      - 'src/**'
      - 'include/**'
      - 'js/core-autotest/**'
      - 'js/corereplay/**'
      - '.github/workflows/autotest.yml'
      - 'CMakeLists.txt'
      - 'scripts/autotest.sh'
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and run autotests on ubuntu-latest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++-14 gcc-14 clang lld llvm
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 100

      - name: Build Core Engine
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo 
          cmake --build build --target corertt_headless
          
      - name: Build Corelib and Tests
        run: |
          make -C corelib CLANG=1 -j$(nproc)

      - name: rustup toolchain install
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: riscv32imac-unknown-none-elf

      - name: Setup Node.js
        uses: actions/setup-node@v6
        
      - name: Setup pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 10

      - name: Install pnpm dependencies
        run: |
          pnpm -C js install

      - name: Run autotests
        run: |
          ./scripts/autotest.sh
