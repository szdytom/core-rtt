name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  cpp-cmake-build:
    name: CMake (${{ matrix.os }} / ${{ matrix.compiler }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
            cc: gcc
            cxx: g++
          - os: ubuntu-latest
            compiler: clang
            cc: clang
            cxx: clang++
          - os: windows-latest
            compiler: msvc
            generator: "Visual Studio 17 2022"
            toolset: ""
          - os: windows-latest
            compiler: clang
            generator: "Visual Studio 17 2022"
            toolset: "ClangCL"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: cmake -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo .

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: cmake --build build --config RelWithDebInfo

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $args = @(
            '-B', 'build',
            '-G', '${{ matrix.generator }}',
            '-A', 'x64'
          )
          if ('${{ matrix.toolset }}' -ne '') {
            $args += @('-T', '${{ matrix.toolset }}')
          }
          $args += @('.', '-DCMAKE_BUILD_TYPE=RelWithDebInfo')
          cmake @args

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config RelWithDebInfo

  corelib-make-build:
    name: corelib make (${{ matrix.os }} / ${{ matrix.toolchain }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            toolchain: gcc
          - os: ubuntu-latest
            toolchain: clang
          - os: windows-latest
            toolchain: clang

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GNU RISC-V toolchain (Linux GCC)
        if: runner.os == 'Linux' && matrix.toolchain == 'gcc'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-riscv64-unknown-elf binutils-riscv64-unknown-elf make

      - name: Build corelib with GNU toolchain (Linux GCC)
        if: runner.os == 'Linux' && matrix.toolchain == 'gcc'
        working-directory: corelib
        run: make CC=riscv64-unknown-elf-gcc AR=riscv64-unknown-elf-ar -j"$(nproc)"

      - name: Install LLVM toolchain (Linux Clang)
        if: runner.os == 'Linux' && matrix.toolchain == 'clang'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld llvm make

      - name: Build corelib with LLVM toolchain (Linux Clang)
        if: runner.os == 'Linux' && matrix.toolchain == 'clang'
        working-directory: corelib
        run: make CLANG=1 -j"$(nproc)"

      - name: Setup MSYS2 (Windows Clang)
        if: runner.os == 'Windows' && matrix.toolchain == 'clang'
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          install: >-
            make
            clang
            lld
            llvm

      - name: Build corelib with LLVM toolchain (Windows Clang)
        if: runner.os == 'Windows' && matrix.toolchain == 'clang'
        shell: msys2 {0}
        working-directory: corelib
        run: make CLANG=1 -j"$(nproc)"
